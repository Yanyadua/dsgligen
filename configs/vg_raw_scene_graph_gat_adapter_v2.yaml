diffusion:
  target: ldm.models.diffusion.ldm.LatentDiffusion
  params:
    linear_start: 0.00085
    linear_end: 0.012
    timesteps: 1000

model:
  target: ldm.modules.diffusionmodules.openaimodel.UNetModel
  params:
    image_size: 64
    in_channels: 4
    out_channels: 4
    model_channels: 320
    attention_resolutions: [4, 2, 1]
    num_res_blocks: 2
    channel_mult: [1, 2, 4, 4]
    num_heads: 8
    transformer_depth: 1
    context_dim: 768
    fuser_type: gatedSA
    use_checkpoint: True

    grounding_tokenizer:
      target: ldm.modules.diffusionmodules.scene_graph_grounding_net.PositionNet
      params:
        in_dim: 768
        out_dim: 768
        hidden_dim: 768
        gat_layers: 1
        gat_heads: 2
        relation_dim: 768
        dropout: 0.0
        graph_gate_init: -5.0
        use_graph_adapter: True
        graph_adapter_ratio: 0.25

object_align_loss_weight: 0.2

autoencoder:
  target: ldm.models.autoencoder.AutoencoderKL
  params:
    scale_factor: 0.18215
    embed_dim: 4
    ddconfig:
      double_z: true
      z_channels: 4
      resolution: 256
      in_channels: 3
      out_ch: 3
      ch: 128
      ch_mult: [1, 2, 4, 4]
      num_res_blocks: 2
      attn_resolutions: []
      dropout: 0.0

text_encoder:
  target: ldm.modules.encoders.modules.FrozenCLIPEmbedder

train_dataset_names:
  VGSceneGraphRaw:
    image_root: /root/autodl-tmp/VG/images
    scene_graphs_json: /root/autodl-tmp/VG/annotations/scene_graphs.json
    image_size: 512
    max_boxes_per_data: 12
    max_relations_per_data: 24
    max_images: 2000
    min_objects: 2
    min_relations: 1
    max_caption_objects: 8
    max_caption_relations: 4
    random_crop: False
    random_flip: True

grounding_tokenizer_input:
  target: grounding_input.scene_graph_grounding_tokenizer_input.GroundingNetInput
