diffusion:
  target: ldm.models.diffusion.ldm.LatentDiffusion
  params:
    linear_start: 0.00085
    linear_end: 0.012
    timesteps: 1000

model:
  target: ldm.modules.diffusionmodules.openaimodel.UNetModel
  params:
    image_size: 64
    in_channels: 4
    out_channels: 4
    model_channels: 320
    attention_resolutions: [4, 2, 1]
    num_res_blocks: 2
    channel_mult: [1, 2, 4, 4]
    num_heads: 8
    transformer_depth: 1
    context_dim: 768
    fuser_type: gatedSA
    use_checkpoint: True

    grounding_tokenizer:
      target: ldm.modules.diffusionmodules.scene_graph_grounding_net.CompatiblePositionNet
      params:
        in_dim: 768
        out_dim: 768
        gat_layers: 1
        gat_heads: 2
        relation_dim: 768
        relation_geo_dim: 12
        relation_visual_dim: 64
        relation_predicate_vocab_size: 46
        graph_visual_dim: 64
        dropout: 0.0
        graph_gate_init: -2.0
        use_graph_adapter: True
        graph_adapter_ratio: 0.25
        graph_mode: spatial
        edge_dropout: 0.15

use_fixed_split_train: true
enable_relation_visual_align: true
enable_graph_image_align: true
enable_masked_relation_pretrain: true

diffusion_loss_weight: 0.0
object_align_loss_weight: 0.0
spatial_consistency_loss_weight: 0.0
relation_geo_prediction_loss_weight: 0.1
relation_geo_prediction_beta: 0.1
relation_geo_prediction_filter_predicates: true
relation_visual_align_loss_weight: 0.05
relation_visual_align_output_size: 4
relation_visual_align_filter_predicates: false
graph_image_align_loss_weight: 0.05
graph_image_align_output_size: 4
masked_relation_loss_weight: 0.05
masked_relation_ratio: 0.15
masked_relation_geo_weight: 1.0

log_graph_stats: true
graph_stats_interval: 20

autoencoder:
  target: ldm.models.autoencoder.AutoencoderKL
  params:
    scale_factor: 0.18215
    embed_dim: 4
    ddconfig:
      double_z: true
      z_channels: 4
      resolution: 256
      in_channels: 3
      out_ch: 3
      ch: 128
      ch_mult: [1, 2, 4, 4]
      num_res_blocks: 2
      attn_resolutions: []
      dropout: 0.0

text_encoder:
  target: ldm.modules.encoders.modules.FrozenCLIPEmbedder

train_dataset_names:
  VGSceneGraphFixedSplit:
    h5_path: /root/autodl-tmp/fixed_split_work/datasets/vg/train.h5
    vocab_path: /root/autodl-tmp/fixed_split_work/datasets/vg/vocab.json
    image_root: /root/autodl-tmp/fixed_split_work/datasets/vg/images
    split_name: train
    image_size: 512
    max_boxes_per_data: 12
    max_relations_per_data: 24
    max_images: 2000
    min_objects: 2
    min_relations: 1
    max_caption_objects: 10
    max_caption_relations: 4
    random_crop: False
    random_flip: True

grounding_tokenizer_input:
  target: grounding_input.scene_graph_grounding_tokenizer_input.GroundingNetInput
